<!DOCTYPE html>
<html>
<head>
    <title>Join - Nepal Trading Investment Partners</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Join Trading Partners</h1>
    <p>Fill your details to show your interest.</p>
</header>

<section>

<form id="joinForm">

<label>Name:</label><br>
<input id="name" type="text" required><br><br>

<label>Country:</label><br>
<input id="country" type="text" required><br><br>

<label>WhatsApp Number:</label><br>
<input id="whatsapp" type="text" required><br><br>

<label>Trading Interest:</label><br>
<input id="interest" type="text" required><br><br>

<button type="submit">Submit</button>

</form>

<script>
document.getElementById("joinForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        country: document.getElementById("country").value,
        whatsapp: document.getElementById("whatsapp").value,
        interest: document.getElementById("interest").value
    };

    const response = await fetch("https://nepaltradingpartners-backend.onrender.com/register", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    });

    const result = await response.json();
    alert(result.message);
});
</script>



</form>

</section>

</body>
</html>
